name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Type Check ────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
        name: Type check

  # ── Lint ──────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx next lint --max-warnings 0
        name: Lint
        continue-on-error: true  # 警告は無視、エラーのみ失敗

  # ── Build check ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_placeholder
      NEXT_PUBLIC_DEFAULT_TEAM_ID: 00000000-0000-0000-0000-000000000000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
      ANTHROPIC_API_KEY: sk-ant-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx next build
        name: Build
        env:
          DOCKER_BUILD: "1"

  # ── E2E Tests (on PR to main) ─────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --reporter=github
        name: Run Playwright tests
        env:
          BASE_URL: ${{ secrets.VERCEL_PREVIEW_URL || 'https://axelia-analytics.vercel.app' }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
